<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a8fd4">
<title>Дневник</title>
<style>
  :root{
    --blue:#1a8fd4;
    --blue-dark:#1683c4;
    --green:#5cb85c;
    --green2:#4cae4c;
    --red:#e8543f;
    --orange:#f0823c;
    --yellow:#f5b921;
    --gradeblue:#3a9fe0;
    --gray:#c9ced3;
    --line:#e4e7ea;
    --text:#1c1c1e;
    --muted:#8a8f94;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#1c1c1e;
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
  }
  /* Phone frame (hidden on actual mobile fullscreen) */
  .phone{
    position:relative;
    width:100%;max-width:430px;height:100vh;max-height:932px;
    background:#fff;overflow:hidden;display:flex;flex-direction:column;
  }
  @media(min-width:480px){
    .phone{border-radius:46px;box-shadow:0 20px 60px rgba(0,0,0,.5);border:12px solid #0a0a0a;height:932px;}
  }

  /* Status-bar spacer: fills the notch/safe area with blue so the REAL
     device clock/battery sit on top of it. No fake clock = no overlap glitch. */
  .statusbar{
    background:var(--blue);flex:0 0 auto;
    height:env(safe-area-inset-top);
    min-height:0;
  }
  /* On desktop (no safe-area inset) show a small blue strip so it still looks like a phone */
  @media(min-width:480px){
    .statusbar{min-height:18px;}
  }

  /* Header / topbar */
  .topbar{
    background:var(--blue);color:#fff;flex:0 0 auto;
    height:56px;display:flex;align-items:center;justify-content:center;position:relative;
  }
  .topbar .title{font-size:21px;font-weight:600;display:flex;align-items:center;gap:9px;}
  .topbar .leftbtn{position:absolute;left:18px;top:0;height:100%;display:flex;align-items:center;font-size:18px;font-weight:600;gap:5px;cursor:pointer;}
  .topbar .rightbtn{position:absolute;right:20px;top:0;height:56px;display:flex;align-items:center;font-size:30px;font-weight:300;cursor:pointer;}
  .bookicon{font-size:20px}

  /* Sub-tabs (Дневник) */
  .subtabs{
    background:var(--blue);color:#fff;flex:0 0 auto;display:flex;
    padding:4px 4px 8px;
  }
  .subtab{flex:1;text-align:center;font-size:12px;opacity:.72;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;padding:2px 1px;line-height:1.1;}
  .subtab .ic{font-size:19px;height:22px;display:flex;align-items:center;}
  .subtab.active{opacity:1;font-weight:600;border-bottom:2.5px solid #fff;padding-bottom:4px;}
  .subtab span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}

  /* Content */
  .content{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#fff;}

  /* Section banner */
  .banner{
    background:#f1f3f5;display:flex;align-items:center;justify-content:space-between;
    padding:15px 18px;color:var(--blue);font-size:17px;font-weight:500;
    border-bottom:1px solid var(--line);cursor:pointer;
  }
  .banner.plain{color:var(--blue);}
  .banner .chev{color:#b8bec4;font-size:20px;}

  /* Subject rows */
  .srow{padding:16px 18px;border-bottom:1px solid var(--line);}
  .srow .name{display:flex;align-items:center;gap:9px;font-size:19px;font-weight:600;color:#222;}
  .srow .name .bk{color:#3a3f44;font-size:17px;}
  .srow .meta{margin-top:11px;display:flex;align-items:center;gap:18px;font-size:15px;color:var(--muted);flex-wrap:wrap;}
  .srow .meta .pair{display:flex;align-items:center;gap:8px;}
  .nomark{margin-top:9px;color:#a7adb3;font-size:15px;}

  /* Badges */
  .badge{min-width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;padding:0 4px;}
  .b-gray{background:#e6eaed;color:#a8aeb4;}
  .b-yellow{background:var(--yellow);}
  .b-orange{background:var(--orange);}
  .b-red{background:var(--red);}
  .b-green{background:var(--green);}

  /* Grade circles */
  .grades{margin-top:12px;display:flex;gap:11px;flex-wrap:wrap;}
  .g{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:600;}
  .g2{background:var(--red);}
  .g3{background:var(--orange);}
  .g4{background:var(--yellow);}
  .g5{background:var(--gradeblue);}
  .g6{background:var(--green);}

  /* Period picker page (Избери) */
  .prow{display:flex;align-items:center;justify-content:space-between;padding:18px 18px;border-bottom:1px solid var(--line);font-size:20px;font-weight:600;color:#1c1c1e;cursor:pointer;}
  .prow.sel{color:var(--blue);}
  .prow .mark{color:var(--blue);font-size:26px;font-weight:300;line-height:1;}

  /* Annual (Срочни/годишни) columns */
  .annual{display:flex;align-items:center;margin-top:13px;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;scrollbar-width:none;}
  .annual::-webkit-scrollbar{display:none;}
  .acol{display:flex;align-items:center;gap:10px;flex:0 0 auto;}
  .acol .alabel{font-size:15px;color:var(--muted);}
  .asep{width:1px;height:24px;background:#e1e5e8;margin:0 15px;flex:0 0 auto;}
  .gsm{width:30px;height:30px;font-size:15px;}
  .gempty{background:#e6eaed;}

  /* Grade detail screen */
  .srow.tap{cursor:pointer;}
  .topbar.tall{height:74px;}
  .dtitle{text-align:center;color:#fff;}
  .dtitle .l1{font-size:18px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;}
  .dtitle .l1 svg{width:16px;height:16px;fill:#fff;}
  .dtitle .l2{font-size:14px;font-weight:400;margin-top:3px;opacity:.97;}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;}
  .dhead .lab{color:var(--blue);font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
  .dgap{height:14px;background:#eceff1;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .drowg{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);}
  .drowg .info{flex:1;min-width:0;}
  .drowg .ttl{font-size:19px;color:#1c1c1e;}
  .drowg .dt{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:15px;margin-top:5px;}
  .drowg .dt svg{width:15px;height:15px;stroke:var(--muted);}
  .drowg .dchev{color:#c5cbd1;font-size:20px;}

  /* Discussions */
  .drow{display:flex;gap:14px;padding:15px 16px;border-bottom:1px solid var(--line);cursor:pointer;}
  .avatar{flex:0 0 auto;width:50px;height:50px;border-radius:50%;background:#eceff1;display:flex;align-items:center;justify-content:center;color:#b7bdc3;position:relative;}
  .avatar svg{width:30px;height:30px;}
  .avatar .env{position:absolute;left:-2px;bottom:-2px;width:22px;height:22px;background:var(--blue);border-radius:4px;display:flex;align-items:center;justify-content:center;}
  .avatar .env svg{width:13px;height:13px;}
  .dbody{flex:1;min-width:0;}
  .dbody .dt{font-size:17px;font-weight:700;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dbody .dt.reg{font-weight:400;}
  .dbody .dauthor{font-size:15px;color:#3a3f44;margin-top:3px;}
  .dbody .dprev{font-size:15px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Notifications */
  .nhead{text-align:right;color:var(--blue);font-size:16px;padding:13px 18px;border-bottom:1px solid var(--line);cursor:pointer;}
  .nrow{display:flex;gap:14px;align-items:flex-start;padding:17px 18px;border-bottom:1px solid var(--line);}
  .nrow .bell{flex:0 0 auto;color:#3a3f44;font-size:19px;margin-top:1px;}
  .nrow .ntext{font-size:17px;color:#1c1c1e;line-height:1.3;}
  .nrow.unread .ntext{font-weight:700;}

  /* Student picker */
  .pickhead{background:#f1f3f5;color:#7c8288;font-size:14px;font-weight:600;letter-spacing:.5px;padding:13px 18px;border-bottom:1px solid var(--line);}
  .pickrow{display:flex;align-items:center;gap:15px;padding:17px 18px;border-bottom:1px solid var(--line);cursor:pointer;font-size:21px;color:#1c1c1e;}
  .pickrow .pic{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:#1c1c1e;}

  /* Bottom nav */
  .tabbar{
    flex:0 0 auto;display:flex;background:#fff;border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;color:#9aa0a6;font-size:12px;cursor:pointer;position:relative;}
  .tab.active{color:var(--blue);}
  .tab .tic{font-size:23px;height:26px;display:flex;align-items:center;}
  .tab .nbadge{position:absolute;top:4px;left:54%;background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

  .empty{padding:40px 18px;text-align:center;color:#a7adb3;font-size:16px;}
  .hide{display:none!important;}
</style>
</head>
<body>
<div class="phone">

  <!-- STATUS BAR (blue spacer for the real device status bar) -->
  <div class="statusbar"></div>

  <!-- TOPBAR (changes per screen) -->
  <div class="topbar" id="topbar"></div>

  <!-- SUBTABS (Дневник only) -->
  <div class="subtabs hide" id="subtabs"></div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>

  <!-- BOTTOM NAV -->
  <div class="tabbar" id="tabbar"></div>

</div>

<script>
/* ============ DATA ============ */

// Absences: [late(Закъс), unexcused(Неуваж), excused(Уваж)]
const absences = [
  {n:"ОБЩО", v:[9,16,250], strong:true},

// Grades — Bulgarian 2..6
const grades = [
  {n:"Български език и литература", g:[4,5,4,5]},
  {n:"Английски език", g:[5,6,6,5,5]},
  {n:"Руски език", g:[5,6,6,6]},
  {n:"Математика", g:[4,5,4,6]},
  {n:"Гражданско образование", g:[3,6,4]},
  {n:"Физическо възпитание и спорт", g:[5,3,5,6,6]},
  {n:"Английски език (ИУЧ - ПП)", g:[]},
  {n:"МОДУЛ 1 - Устно общуване (ИУЧ - ПП (зад. модул)) (Английски език)", g:[6,6]},
  {n:"МОДУЛ 2 - Писмено общуване (ИУЧ - ПП (зад. модул)) (Английски език)", g:[]},
  {n:"МОДУЛ 3 - Езикът чрез литературата (ИУЧ - ПП (зад. модул)) (Английски език)", g:[5,4]},
  {n:"МОДУЛ 4 - Култура и междукултурно общуване (ИУЧ - ПП (зад. модул)) (Английски език)", g:[5,6]},
  {n:"Английски език чрез културно-творческо интегрирано обучение (ИУЧ - ПП (изб. модул)) (Английски език)", g:[6,6,6,6]},

  {n:"МОДУЛ 1 - Устно общуване (ИУЧ - ПП (зад. модул)) (Руски език)", g:[5,6,6]},
  {n:"МОДУЛ 2 - Писмено общуване (ИУЧ - ПП (зад. модул)) (Руски език)", g:[6,6,5]},
  {n:"Руски фолклор и традиции (ИУЧ - ПП (изб. модул)) (Руски език)", g:[6,6]},
  {n:"История и цивилизации (ИУЧ - ПП)", g:[]},
  {n:"МОДУЛ 1 - Власт и институции (ИУЧ - ПП (зад. модул)) (История и цивилизации)", g:[5,6]},
  {n:"МОДУЛ 2 - Култура и духовност (ИУЧ - ПП (зад. модул)) (История и цивилизации)", g:[5]},
  {n:"МОДУЛ 3 - Човек и общество (ИУЧ - ПП (зад. модул)) (История и цивилизации)", g:[4,5]},
  {n:"Държави, общества и култури от Античността до Новото време (ИУЧ - ПП (изб. модул)) (История и цивилизации)", g:[6,6]},
  {n:"Български език и литература (ИУЧ - РП/УП-А)", g:[4,5]},
  {n:"Спортни дейности (волейбол) (...)", g:[]},
  {n:"Безопасност на движението (...)", g:[]},
  {n:"Час на класа (...)", g:[]},
];

// Срочни/годишни — aligned 1:1 with `grades` order. {ps:Първи срок, vs:Втори срок, g:Годишна}
const annual = [
  {ps:5,   vs:5,   g:5},    // Български език и литература
  {ps:6,   vs:5,   g:6},    // Английски език
  {ps:4,   vs:6,   g:6},    // Руски език
  {ps:5,   vs:5,   g:5},    // Математика
  {ps:4,   vs:4,   g:4},    // Гражданско образование
  {ps:5,   vs:5,   g:5},    // Физическо възпитание и спорт
  {ps:null,vs:null,g:5},    // Английски език (ИУЧ - ПП)
  {ps:6,   vs:6,   g:6},    // М1 Устно общуване (Англ)
  {ps:5,   vs:5,   g:5},    // М2 Писмено общуване (Англ)
  {ps:6,   vs:4,   g:5},    // М3 Езикът чрез литературата (Англ)
  {ps:4,   vs:6,   g:5},    // М4 Култура и междукултурно (Англ)
  {ps:6,   vs:6,   g:6},    // Англ. чрез културно-творческо (изб)
  {ps:null,vs:null,g:6},    // Руски език (ИУЧ - ПП)
  {ps:4,   vs:6,   g:6},    // М1 Устно общуване (Руски)
  {ps:6,   vs:6,   g:6},    // М2 Писмено общуване (Руски)
  {ps:6,   vs:6,   g:6},    // Руски фолклор и традиции (изб)
  {ps:null,vs:null,g:6},    // История и цивилизации (ИУЧ - ПП)
  {ps:6,   vs:6,   g:6},    // М1 Власт и институции (История)
  {ps:6,   vs:5,   g:6},    // М2 Култура и духовност (История)
  {ps:6,   vs:5,   g:5},    // М3 Човек и общество (История)
  {ps:6,   vs:6,   g:6},    // Държави, общества и култури (изб)
  {ps:4,   vs:5,   g:5},    // Български език и литература (ИУЧ - РП/УП-А)
  {ps:null,vs:null,g:null}, // Спортни дейности (волейбол)
  {ps:null,vs:null,g:null}, // Безопасност на движението
  {ps:null,vs:null,g:null}, // Час на класа
];

// Първи срок — отделни оценки, оформят се към срочните по-горе. Aligned 1:1 with `grades`.
const firstTerm = [
  [5,4,6,5,5],   // Български език и литература → 5
  [6,6,5,6],     // Английски език → 6
  [4,4,5,3],     // Руски език → 4
  [5,5,4,6,5],   // Математика → 5
  [4,4,3,5],     // Гражданско образование → 4
  [5,6,5,4,6],   // Физическо възпитание и спорт → 5
  [],            // Английски език (ИУЧ - ПП)
  [6,6],         // М1 Устно общуване (Англ) → 6
  [5,5],         // М2 Писмено общуване (Англ) → 5
  [6,6],         // М3 Езикът чрез литературата (Англ) → 6
  [4,4],         // М4 Култура и междукултурно (Англ) → 4
  [6,6],         // Англ. чрез културно-творческо (изб) → 6
  [],            // Руски език (ИУЧ - ПП)
  [4,4],         // М1 Устно общуване (Руски) → 4
  [6,6],         // М2 Писмено общуване (Руски) → 6
  [6,6],         // Руски фолклор и традиции (изб) → 6
  [],            // История и цивилизации (ИУЧ - ПП)
  [6,6],         // М1 Власт и институции (История) → 6
  [6,6],         // М2 Култура и духовност (История) → 6
  [6,6],         // М3 Човек и общество (История) → 6
  [6,6],         // Държави, общества и култури (изб) → 6
  [4,4,5],       // Български език и литература (ИУЧ - РП/УП-А) → 4
  [],            // Спортни дейности (волейбол)
  [],            // Безопасност на движението
  [],            // Час на класа
];

// Build per-subject detail: each grade linked to an assessment type + date.
const _pool2 = ["Практическо изпитване","Проект","Класна работа","Писмено изпитване","Устно изпитване","Тест","Контролна работа","Активно участие","Домашна работа"];
const _pool1 = ["Тест","Класна работа","Активно участие","Домашна работа","Писмено изпитване","Практическо изпитване","Устно изпитване","Междинно равнище","Контролна работа"];
function _entries(arr,pool,endY,endM,endD,i){
  const r=[]; let d=new Date(endY,endM-1,endD-(i%6)*2);
  for(let k=0;k<arr.length;k++){
    const t=pool[(i+k)%pool.length];
    const dd=String(d.getDate()).padStart(2,'0'), mm=String(d.getMonth()+1).padStart(2,'0');
    r.push({g:arr[k],type:t,date:`${dd}.${mm}.${d.getFullYear()}`});
    d=new Date(d.getTime()-((12+((i+k)%4)*4))*86400000);
  }
  return r;
}
const detail = grades.map((s,i)=>{
  const f=_entries(firstTerm[i],_pool1,2026,1,27,i);
  if(f.length) f[f.length-1].type="Входно равнище";
  return { name:s.n, annual:annual[i], second:_entries(s.g,_pool2,2026,6,25,i), first:f };
});

// Reviews: [praise(Похвали), remarks(Забележки)]
const reviews = [
  {n:"ОБЩО", v:[11,19], strong:true},
  {n:"Общи отзиви", v:[0,0]},
  {n:"Български език и литература", v:[1,2]},
  {n:"Английски език", v:[0,4]},
  {n:"Руски език", v:[0,3]},
  {n:"Математика", v:[0,1]},
  {n:"Гражданско образование", v:[3,4]},
  {n:"Физическо възпитание и спорт", v:[0,2]},
  {n:"Английски език (ИУЧ - ПП)", v:[0,0]},
  {n:"МОДУЛ 1 - Устно общуване (ИУЧ - ПП (зад. модул)) (Английски език)", v:[0,0]},
  {n:"МОДУЛ 2 - Писмено общуване (ИУЧ - ПП (зад. модул)) (Английски език)", v:[0,0]},

/* ============ HELPERS ============ */
function absBadge(val, kind){
  if(val===0) return `<span class="badge b-gray">0</span>`;
  let cls = kind==='late' ? 'b-yellow' : kind==='unex' ? 'b-red' : 'b-green';
  return `<span class="badge ${cls}">${val}</span>`;
}
function revBadge(val, kind){
  if(val===0) return `<span class="badge b-gray">0</span>`;
  let cls = kind==='praise' ? 'b-green' : 'b-orange';
  return `<span class="badge ${cls}">${val}</span>`;
}

/* ============ BOTTOM NAV ============ */
function renderTabbar(){
  const bar = document.getElementById('tabbar');
  if(state.periodPicker){ bar.style.display='none'; return; }
  bar.style.display='flex';
  const tabs = [
    {k:'diary', label:'Дневник', i:ic.diary},
    {k:'disc', label:'Дискусии', i:ic.chat},
    {k:'notif', label:'Известия', i:ic.bell, badge:'9+'},
    {k:'more', label:'Още', i:ic.more},
  ];
  const cur = state.tab==='picker' ? 'diary' : state.tab;
  document.getElementById('tabbar').innerHTML = tabs.map(t=>`
    <div class="tab ${cur===t.k?'active':''}" onclick="setTab('${t.k}')">
      <div class="tic">${t.i}</div>
      ${t.badge?`<span class="nbadge">${t.badge}</span>`:''}
      <span>${t.label}</span>
    </div>`).join('');
}

/* ============ NAV ACTIONS ============ */
function render(){ renderChrome(); renderContent(); renderTabbar(); }
function gcircle(v){ return v==null ? `<span class="g gsm gempty"></span>` : `<span class="g gsm g${v}">${v}</span>`; }
function openPeriod(){ state.periodPicker=true; render(); }
function closePeriod(){ state.periodPicker=false; render(); }
function choosePeriod(p){ state.period=p; state.periodPicker=false; render(); }
function openDetail(i){ state.detailIdx=i; render(); }
function closeDetail(){ state.detailIdx=null; render(); }

function _gb(v){ return v==null ? `<span class="g gempty"></span>` : `<span class="g g${v}">${v}</span>`; }
function _drow(e){
  return `<div class="drowg">
    ${e.g==null ? `<span class="g gempty"></span>` : `<span class="g g${e.g}">${e.g}</span>`}
    <div class="info"><div class="ttl">${e.type}</div><div class="dt">${ic.cal} ${e.date}</div></div>
    <span class="dchev">&#9662;</span>
  </div>`;
}
function renderDetail(){
  const d = detail[state.detailIdx];
  let h = '';
  h += `<div class="dhead"><span class="lab">Годишна оценка</span>${_gb(d.annual.g)}</div>`;
  h += `<div class="dgap"></div>`;
  h += `<div class="dhead"><span class="lab">Втори срок</span>${_gb(d.annual.vs)}</div>`;
  h += d.second.length ? d.second.map(_drow).join('') : `<div class="nomark" style="padding:14px 18px;">Няма оценки</div>`;
  h += `<div class="dgap"></div>`;
  h += `<div class="dhead"><span class="lab">Първи срок</span>${_gb(d.annual.ps)}</div>`;
  h += d.first.length ? d.first.map(_drow).join('') : `<div class="nomark" style="padding:14px 18px;">Няма оценки</div>`;
  h += `<div class="dgap"></div>`;
  return h;
}

function setTab(k){
  state.periodPicker=false; state.detailIdx=null;
  if(k==='diary'){ state.tab = state.picked ? 'diary' : 'picker'; }
  else state.tab = k;
  render();
}
function setSub(k){ state.periodPicker=false; state.detailIdx=null; state.sub = k; render(); }
function goPicker(){ state.tab='picker'; render(); }
function goDiary(){ state.picked=true; state.tab='diary'; state.sub='abs'; render(); }

/* init */
render();
